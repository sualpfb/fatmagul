<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapanış 🥀</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #888;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #2a2a2a;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            border: 1px solid #333;
            max-width: 400px;
        }
        h1 {
            color: #555;
            letter-spacing: 5px;
            margin-bottom: 5px;
        }
        .login-input {
            background: #222;
            border: 1px solid #444;
            color: #666;
            text-align: center;
            font-size: 16px;
            padding: 12px;
            width: 80%;
            margin-top: 25px;
            transition: 0.3s;
            opacity: 0.4; /* Soluk görünüm */
        }
        .login-input:focus {
            outline: none;
            border-color: #555;
            opacity: 0.7;
        }
        button {
            background-color: #333;
            color: #888;
            border: 1px solid #444;
            padding: 10px 20px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 5px;
            letter-spacing: 1px;
        }
        button:hover {
            background-color: #444;
            color: #aaa;
        }
        #sonuc {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="font-size: 40px; margin-bottom: 10px; opacity: 0.3;">🕰️</div>
        <h1>KAPANIŞ</h1>
        <p style="opacity: 0.5; font-size: 14px;">İçeride birtakım geçmiş var.</p>

        <input type="text" id="serial" class="login-input" placeholder="artık şifreye gerek yok...">
        <br>
        <button onclick="kontrolEt()">İçeri Gir</button>

        <p id="sonuc"></p>
    </div>

    <script>
        function kontrolEt() {
            const sonuc = document.getElementById("sonuc");
            // Şifre kontrolü tamamen kaldırıldı.
            sonuc.innerHTML = "Bağlantı kuruluyor... Arşive yönlendiriliyorsunuz.";
            setTimeout(() => {
                window.location.href = "video-menu.html";
            }, 1200);
        }

        // Enter tuşuna basınca da giriş yapsın
        document.getElementById("serial").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                kontrolEt();
            }
        });
    </script>
</body>
</html>
